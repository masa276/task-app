version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:10000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend/src:/app/src
